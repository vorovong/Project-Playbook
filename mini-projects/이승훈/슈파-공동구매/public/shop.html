<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>슈파 - 신선한 식자재 공동구매</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, '맑은 고딕', sans-serif;
      background: #f5f5f5;
      color: #333;
      max-width: 480px;
      margin: 0 auto;
    }

    /* 상단 헤더 */
    .header {
      background: #2c3e50;
      color: white;
      padding: 16px 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 18px; font-weight: 700; }
    .header .subtitle { font-size: 12px; color: #95a5a6; margin-top: 2px; }

    /* 안내 배너 */
    .banner {
      background: #fff3cd;
      color: #856404;
      padding: 12px 20px;
      font-size: 13px;
      text-align: center;
      border-bottom: 1px solid #ffc107;
    }

    /* 상품 그리드 */
    .product-grid {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .product-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      overflow: hidden;
      display: flex;
    }

    .product-image {
      width: 120px;
      height: 120px;
      flex-shrink: 0;
      background: #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .product-image .no-image {
      font-size: 40px;
      color: #ddd;
    }

    .product-info {
      padding: 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .product-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .product-volume {
      font-size: 12px;
      color: #999;
      margin-bottom: 8px;
    }
    .product-price {
      font-size: 18px;
      font-weight: 700;
      color: #2c3e50;
    }
    .product-market-price {
      font-size: 12px;
      color: #bbb;
      text-decoration: line-through;
    }
    .product-saving {
      display: inline-block;
      background: #e8f5e9;
      color: #27ae60;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-top: 4px;
    }
    .product-shipping {
      font-size: 11px;
      color: #999;
      margin-top: 6px;
    }

    /* 로딩 */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    /* 빈 상태 */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* 하단 안내 */
    .footer {
      text-align: center;
      padding: 24px 20px;
      color: #bbb;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>슈파</h1>
    <div class="subtitle">소상공인을 위한 식자재 공동구매</div>
  </div>

  <div class="banner">
    주문은 카카오톡 채팅에서 해주세요!
  </div>

  <div class="product-grid" id="productGrid">
    <div class="loading">상품을 불러오는 중...</div>
  </div>

  <div class="footer">
    15시 전 주문 → 당일출고 | 15시 이후 → 익일출고
  </div>

  <script>
    async function loadProducts() {
      const container = document.getElementById('productGrid');

      try {
        const res = await fetch('/api/products');
        const products = await res.json();

        // 판매중인 상품만 필터
        const active = products.filter(p => p.status === '판매중');

        if (active.length === 0) {
          container.innerHTML = `
            <div class="empty">
              <div class="empty-icon">📦</div>
              <div>현재 판매중인 상품이 없습니다</div>
            </div>
          `;
          return;
        }

        container.innerHTML = active.map(p => {
          const savingPercent = p.market_price > 0
            ? Math.round((1 - p.price / p.market_price) * 100)
            : 0;

          return `
            <div class="product-card">
              <div class="product-image">
                ${p.image
                  ? `<img src="${esc(p.image)}" alt="${esc(p.name)}">`
                  : `<div class="no-image">📷</div>`
                }
              </div>
              <div class="product-info">
                <div class="product-name">${esc(p.name)}</div>
                <div class="product-volume">${esc(p.volume)} (${esc(p.package_unit)})</div>
                <div>
                  ${p.market_price > 0 ? `<span class="product-market-price">${p.market_price.toLocaleString()}원</span> ` : ''}
                  <span class="product-price">${p.price.toLocaleString()}원</span>
                </div>
                ${savingPercent > 0 ? `<div><span class="product-saving">${savingPercent}% 절감</span></div>` : ''}
                <div class="product-shipping">배송비: ${esc(p.shipping_fee)}</div>
              </div>
            </div>
          `;
        }).join('');

      } catch (e) {
        container.innerHTML = `
          <div class="empty">
            <div class="empty-icon">⚠️</div>
            <div>상품을 불러올 수 없습니다</div>
          </div>
        `;
      }
    }

    function esc(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    loadProducts();
  </script>

</body>
</html>
