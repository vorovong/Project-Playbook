<!DOCTYPE html>
<html><head><title>Icon Generator</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function draw(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');
  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, size, size);
  // Circle
  const r = size * 0.35;
  ctx.beginPath();
  ctx.arc(size/2, size/2, r, 0, Math.PI * 2);
  const g = ctx.createLinearGradient(0, 0, size, size);
  g.addColorStop(0, '#6c5ce7');
  g.addColorStop(1, '#00cec9');
  ctx.fillStyle = g;
  ctx.fill();
  // Text
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${size * 0.22}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('BL', size/2, size/2);
  // Download
  const a = document.createElement('a');
  a.download = `icon-${size}.png`;
  a.href = c.toDataURL('image/png');
  a.click();
}
draw('c192', 192);
draw('c512', 512);
document.body.innerHTML = '<h1>Icons downloaded!</h1>';
</script>
</body>
</html>
